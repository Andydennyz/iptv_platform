services:
  # Backend API Service
  - type: web
    name: iptv-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DB_NAME
        value: iptv
      - key: DB_PORT
        value: 3306
      - key: DB_CONN_LIMIT
        value: 10

  # Frontend Web Service
  - type: web
    name: iptv-web
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l 3000
    envVars:
      - key: VITE_API_URL
        value: https://iptv-api.onrender.com